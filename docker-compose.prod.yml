services:
  frontend:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: gxpilot-frontend
    env_file:
      - .env
    environment:
      VITE_API_TARGET: http://backend:8000
    ports:
      - "3009:5173"
    depends_on:
      backend:
        condition: service_healthy

  backend:
    restart: unless-stopped
    build:
      context: ./backend
    container_name: gxpilot-backend
    env_file:
      - .env
    environment:
      POSTGRES_HOST: pgdb
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-gxpilot}
      POSTGRES_USER: ${POSTGRES_USER:-gxpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gxpilot_password}
    ports:
      - "8000:8000"
    depends_on:
      pgdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  pgdb:
    restart: unless-stopped
    image: postgres:16-alpine
    container_name: gxpilot-pgdb
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gxpilot}
      POSTGRES_USER: ${POSTGRES_USER:-gxpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gxpilot_password}
    ports:
      - "${POSTGRES_PORT:-5445}:5432"
    volumes:
      - pgdb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    restart: unless-stopped
    image: dpage/pgadmin4:8
    container_name: gxpilot-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@gxpilot.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      pgdb:
        condition: service_healthy

volumes:
  pgdb_data:
  pgadmin_data:
